<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise East | Consolidated Financial Statements</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/financials.css">
</head>
<body>
    <header class="main-header">
        <div id="global-nav"></div>
    </header>

    <section class="hero">
        <h1>Consolidated Financial Statements</h1>
        <p>Comprehensive four-way view of activities, position, functional expenses, and budget variances.</p>
    </section>

    <div class="financials-dashboard" style="margin-top: 20px;">
  
    <!-- Tabs Navigation -->
    <div class="actions" style="display: flex; gap: 10px; margin-bottom: 20px;">
        <!-- Active by default -->
        <button class="btn active" data-view="soa">Statement of Activities</button>
        <button class="btn secondary" data-view="sfp">Financial Position</button>
        <button class="btn secondary" data-view="sfe">Functional Expenses</button>
        <button class="btn secondary" data-view="variances">Budget Variances</button>
    </div>
    <div>
      <label for="year-filter" style="font-weight: 600; margin-right: 8px; color: #334155;">Select Fiscal Year:</label>
      <select id="year-filter" style="padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem;">
        <option value="2024" selected>2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
      </select>
    </div>

    <!-- Content Container (Tables will be injected here) -->
    <div id="financials-content" style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto;">
        <p style="text-align: center; color: #64748b;">Loading financial data...</p>
    </div>

  </div>

    <script src="scripts/nav-active.js"></script>
    <script type="module" src="scripts/financials.js"></script>
</body>
</html>
