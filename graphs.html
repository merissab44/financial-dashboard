<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise East | Financial Performance Dashboard</title>
    <!-- External CSS -->
    <link rel="stylesheet" href="styles/graphs.css">
    <!-- Chart.js Dependency (Must load before graphs.js) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="main-header">
        <div id="global-nav"></div>
    </header>
    <!-- Filters Section -->
    <section class="filter-section">
        <div class="filter-container">
            <div class="filter-group">
                <label for="orgSelect">Organization</label>
                <select id="orgSelect"><option value="All">All</option></select>
            </div>
            <div class="filter-group">
                <label for="ratioSelect">Ratio</label>
                <select id="ratioSelect"></select>
            </div>
            <div class="filter-group">
                <label for="chartTypeSelect">Chart Type</label>
                <select id="chartTypeSelect">
                    <option>Multi-Line (Trends Over Time)</option>
                    <option>Grouped Bar (Compare Orgs)</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Year Range</label>
                <div class="year-inputs">
                    <input type="number" id="yearMin" placeholder="Min">
                    <span>to</span>
                    <input type="number" id="yearMax" placeholder="Max">
                </div>
            </div>
            <button id="applyBtn" class="btn-primary">Apply Filters</button>
        </div>
    </section>

    <!-- Task 2: 11-Ratio Performance Grid -->
    <section class="dashboard-content">
        <div class="ratio-grid">
            <!-- 11 Cards for the Ratios identified in Slide 1 -->
            <div class="metric-card"><div class="metric-title">Current Ratio</div><div id="val-current-ratio" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">Quick Ratio</div><div id="val-quick-ratio" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">Operating Reserve</div><div id="val-operating-reserve-ratio" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">A/R Aging >90</div><div id="val-ar-aging-90-days" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">A/P Aging >90</div><div id="val-ap-aging-90-days" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">Debt Ratio</div><div id="val-debt-ratio" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">Program Exp %</div><div id="val-program-expense-ratio" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">Admin Exp %</div><div id="val-admin-expense-ratio" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">Fundraising Eff</div><div id="val-fundraising-efficiency" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">Rev Diversity</div><div id="val-revenue-diversity-ratio" class="metric-value">—</div></div>
            <div class="metric-card"><div class="metric-title">HHI (Est.)</div><div id="val-hhi-est" class="metric-value">—</div></div>
        </div>

        <!-- Main Analytics Chart -->
        <div class="chart-container">
            <canvas id="ratioChart"></canvas>
        </div>
    </section>

    <!-- External Logic -->
    <script src="scripts/graphs.js"></script>
    <script src="scripts/nav-active.js"></script>
</body>
</html>
